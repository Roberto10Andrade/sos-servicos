<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SOS Serviços</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="../index.html">
                    <img src="../assets/images/logo_new.svg" alt="SOS Serviços" class="logo-img" width="200" height="50">
                </a>
            </div>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="servicos.html">Serviços</a>
                <a href="cadastro.html" class="active destaque">Cadastre-se</a>
                <a href="#" onclick="toggleLogin()" class="login-btn">Login</a>
            </div>
        </nav>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleLogin()">&times;</span>
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <main>
        <section class="cadastro-container">
            <div class="cadastro-header">
                <h2>Cadastro de Prestador de Serviços</h2>
                <p>Preencha o formulário abaixo para começar a oferecer seus serviços</p>
            </div>
            
            <form id="cadastroForm" class="cadastro-form">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <div class="form-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="(11) 99999-9999" required>
                </div>

                <div class="form-group">
                    <label for="servico">Tipo de Serviço</label>
                    <select id="servico" name="servico" required>
                        <option value="">Selecione um serviço</option>
                        <option value="Eletricista">Eletricista</option>
                        <option value="Encanador">Encanador</option>
                        <option value="Pedreiro">Pedreiro</option>
                        <option value="Pintor">Pintor</option>
                        <option value="Jardineiro">Jardineiro</option>
                        <option value="Diarista">Diarista</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição dos Serviços</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva sua experiência e os serviços que você oferece..."></textarea>
                </div>

                <div class="form-group">
                    <label for="regiao">Região de Atendimento</label>
                    <input type="text" id="regiao" name="regiao" placeholder="Ex: Zona Sul, Centro..." required>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        Li e aceito os <a href="termos.html">termos de uso</a> e <a href="privacidade.html">política de privacidade</a>
                    </label>
                </div>

                <button type="submit" class="btn-cadastrar">Cadastrar</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>SOS Serviços</h4>
                <p>Conectando você aos melhores profissionais</p>
            </div>
            <div class="footer-links">
                <a href="sobre.html">Sobre Nós</a>
                <a href="contato.html">Contato</a>
                <a href="termos.html">Termos de Uso</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 SOS Serviços - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="../js/app.js"></script>
</body>
</html>
